app:
  title: "Equity Agent Dashboard"
  layout: "wide"

massive:
  api:
    key_env_var: "MASSIVE_API_KEY"
    # api_key is loaded from environment at runtime

dashboard:
  default_user_input: "I want a sustainable and growth-focused portfolio."
  default_portfolio_size: 1000.0
  ticker_delimiter: ","

ui:
  sidebar_header: "Portfolio Preferences"
  portfolio_size_label: "Portfolio Size ($)"
  chat_placeholder: "Describe your portfolio preferences"
  chat_intro: "Tell me what kind of portfolio you want and I will build it."
  chat_tab_label: "Chat"
  suggested_label: "Suggested Tickers:"
  ticker_header_template: "Data for {ticker}"
  section_history: "Historical Data:"
  section_financials: "Financials:"
  download_prompt: "Download as CSV:"
  download_history_label: "Historical prices CSV"
  download_financials_label: "Financials CSV"
  missing_api_key: "Missing OpenRouter API key. Set the OPENROUTER_API_KEY environment variable."
  missing_massive_key: "Missing Massive.com API key. Set the MASSIVE_API_KEY environment variable."
  max_tickers_warning: "Limiting to {max_tickers} tickers for analysis."
  ticker_reply_template: "I found these tickers for your request: {tickers}"
  ticker_validation_error: "I could not find valid ticker symbols from the model output. Please try rephrasing your request."
  weights_fallback_message: "Could not parse portfolio weights from the model. Using equal weights across all tickers."
  weights_tickers_dropped: "Note: The model did not assign weights to {dropped}. These tickers received zero allocation."
  fetch_progress_start: "Fetching ticker data..."
  fetch_progress_ticker: "Fetching {ticker} ({current}/{total})"
  history_fetch_warning: "No historical price data found for: {tickers}. These were skipped."
  history_fetch_all_failed: "Could not fetch historical price data for any suggested ticker. Please try a different request."
  history_ticker_label: "Tickers to plot (history)"
  history_tab_label: "Historical Prices"
  portfolio_tab_label: "Portfolio"
  history_empty_message: "Historical Prices will appear here after ticker analysis is complete."
  portfolio_empty_message: "Portfolio allocation and metrics will appear here after analysis is complete."
  post_analysis_nudge: "Analysis is ready. Check Historical Prices and Portfolio tabs for detailed views."
  portfolio_tab_link: "Open the **Portfolio** tab above to review allocation and performance."
  evaluator_changes_label: "Suggested portfolio changes"
  evaluator_accept_button: "Accept Changes"
  evaluator_reject_button: "Keep Current Portfolio"
  evaluator_iter_label: "Iteration {current} of {max_iterations}"
  evaluator_no_changes: "No further portfolio changes suggested."
  portfolio_output_label: "Recommended Portfolio"
  portfolio_stats_label: "Portfolio Stats"
  portfolio_returns_label: "Portfolio Returns (1Y)"
  portfolio_financials_label: "Portfolio Financials"
  portfolio_stats_template: "Min {min:.2f} | Max {max:.2f} | Median {median:.2f} | Current {current:.2f} | 1Y Return {return_1y:.2%}"

openrouter:
  api:
    base_url: "https://openrouter.ai/api/v1"
    key_env_var: "OPENROUTER_API_KEY"
    http_referer: "http://localhost:8501"
    app_title: "Equity Agent"

  models:
    ticker: "anthropic/claude-3.5-haiku"
    extractor: "anthropic/claude-3.5-haiku"
    weights: "anthropic/claude-3.5-haiku"
    analysis: "anthropic/claude-3.5-haiku"
    evaluator: "anthropic/claude-3.5-haiku"

  outputs:
    extractor_max_tokens: 50
    ticker_max_tokens: 100
    weights_max_tokens: 400
    analysis_max_tokens: 500
    evaluator_max_tokens: 800

  temperatures:
    extractor: 0.0
    ticker: 0.2
    weights: 0.1
    analysis: 0.2
    evaluator: 0.2

  prompts:
    extractor_system: "Extract explicit US ticker symbols from user preferences. Return strict JSON only: {\"include\": [\"AAPL\"], \"exclude\": [\"TSLA\"]}."
    extractor_template: "User request: {user_input}\nExtract explicitly requested include/exclude tickers. If none, return empty arrays."
    ticker_system: "You are a financial assistant. Return up to {num_tickers} comma-separated US stock tickers. No explanations, no commentary."
    ticker_template: "Create a portfolio with up to {num_tickers} US stock tickers for: {user_input}"
    creator_followup_system: "You are a financial assistant refining ticker selection. Return up to {num_tickers} comma-separated US stock tickers. No explanations."
    creator_followup_template: "Refine the portfolio ticker set with up to {num_tickers} US stock tickers based on: {user_input}"
    weights_system: "You are a portfolio allocator. Respond with a single JSON object only. No markdown fences, no explanation, no code blocks."
    weights_template: "Allocate portfolio weights that sum to exactly 1.0 across these tickers.\nReturn ONLY a JSON object: {{\"weights\": {{\"TICKER\": 0.25}}}}\n\nUser preferences: {user_input}\nTickers: {tickers}\nSummary:\n{summary}"
    analysis_system: "You are a financial analyst. Provide a concise evaluation of the recommended tickers."
    analysis_template: "User preferences: {user_input}\nPortfolio size: {portfolio_size}\nTickers: {tickers}\nWeights: {weights}\nAllocation: {allocation}\nSummary:\n{summary}\nProvide a brief evaluation and any risks."
    evaluator_system: "You are a portfolio evaluator. Return concise analysis and include strict JSON at the end with key 'changes' shaped as {\"changes\": {\"add\": [\"AAPL\"], \"remove\": [\"TSLA\"], \"reweight\": {\"MSFT\": 0.2}}}."
    evaluator_template: "User preferences: {user_input}\nPortfolio size: {portfolio_size}\nTickers: {tickers}\nWeights: {weights}\nAllocation: {allocation}\nSummary:\n{summary}\nEvaluate the portfolio and suggest changes if needed."
    evaluator_followup_system: "You are a portfolio evaluator reviewing updated recommendations. Return concise analysis and strict JSON changes at the end."
    evaluator_followup_template: "User preferences: {user_input}\nPortfolio size: {portfolio_size}\nTickers: {tickers}\nWeights: {weights}\nAllocation: {allocation}\nSummary:\n{summary}\nPrevious analysis: {previous_analysis}\nApplied changes: {applied_changes}\nRe-evaluate and suggest any remaining changes."

agents:
  max_iterations: 3

stocks:
  history_period: "1y"
  financials_period: "quarterly"
  max_tickers: 10
  financials_metrics:
    - "Total Revenue"
    - "Cost Of Revenue"
    - "Operating Income"
    - "EBITDA"
    - "Net Income"
